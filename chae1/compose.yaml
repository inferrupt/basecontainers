name: chae1

x-chae1-base: &chae1-base
  image: ${IMAGE:-ghcr.io/inferrupt/chae1:latest}
  command: sleep infinity
  working_dir: /workspaces/${WORKSPACE_NAME:-workspace}
  user: "0:0"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=256m
    - /run:rw,nosuid,size=16m
  environment:
    XDG_CACHE_HOME: /home/agent/.cache
    XDG_CONFIG_HOME: /home/agent/.config
    XDG_DATA_HOME: /home/agent/.local/share
    XDG_STATE_HOME: /home/agent/.local/state
    MISE_DATA_DIR: /home/agent/.local/share/mise
    MISE_CACHE_DIR: /home/agent/.cache/mise

services:
  dev:
    <<: *chae1-base
    container_name: chae1
    hostname: chae1
    volumes:
      - ${AGENT_WORKSPACE:?missing AGENT_WORKSPACE}:/workspaces/${WORKSPACE_NAME:-workspace}:rw
      - chae1-home:/home/agent:rw

volumes:
  chae1-home:
