name: PR checks

on:
  pull_request:
    branches: [ main ]

jobs:
  check-image-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify changed containers bumped IMAGE_VERSION
        run: |
          bash ./scripts/check-pr-container-versions.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

  ci-required:
    needs:
      - check-image-version
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate job results
        run: |
          echo "check-image-version result: ${{ needs.check-image-version.result }}"

          if [ "${{ needs.check-image-version.result }}" != "success" ]; then
            echo "Failure: check-image-version did not succeed"
            exit 1
          fi

          echo "All required jobs passed"
