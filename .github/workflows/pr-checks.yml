name: PR checks

on:
  pull_request:
    branches: [ main ]

jobs:
  ci-required:
    runs-on: ubuntu-latest
    steps:
      - name: CI gate
        run: echo "CI gate"

  check-image-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify changed containers bumped IMAGE_VERSION
        run: |
          bash ./scripts/check-pr-container-versions.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
