name: Publish Devcontainer Images

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/devcontainer-images.yml
      - containers/chae1/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: chae1
            image_name: chae1-devcontainer
            env_var: CHAE1_IMAGE
            context: ./containers/chae1
            dockerfile: ./containers/chae1/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-
            type=ref,event=branch

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Publish digest summary
        run: |
          {
            echo "## ${{ matrix.name }} image published"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Pin with:"
            echo "\`${{ matrix.env_var }}=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
